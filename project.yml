# XcodeGen spec — the .xcodeproj is generated from this and is NOT committed.
# Regenerate with `make gen` (or `xcodegen generate`).
name: Fadeo

options:
  bundleIdPrefix: com.fadeo
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"

packages:
  FadeoCore:
    path: Packages/FadeoCore
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.4

targets:
  Fadeo:
    type: application
    platform: macOS
    sources:
      - path: Fadeo/Sources
      - path: Fadeo/Resources
    dependencies:
      - package: FadeoCore
        product: FadeoCore
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fadeo.Fadeo
        PRODUCT_NAME: Fadeo
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "4"
        # App layer stays Swift 5 language mode for M0; FadeoCore is full Swift 6.
        # We migrate the app to Swift 6 concurrency during the M5 polish pass.
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: Fadeo
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Fadeo. GPLv3."
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "Fadeo controls your music apps (like Spotify and Apple Music) to match your workflow."
        # Sparkle auto-update. SUFeedURL uses GitHub's "latest" release alias so this
        # never needs to change between releases -- it always resolves to whatever tag
        # release.yml most recently published. SUPublicEDKey is the public half of the
        # keypair from scripts/generate-sparkle-keys.swift; the private half lives at
        # ~/.fadeo-secrets/sparkle-signing-key.txt and in the SPARKLE_PRIVATE_KEY CI
        # secret, never in this repo. This is Sparkle's own tamper-evidence scheme,
        # unrelated to Apple code signing/Developer ID -- it works fine ad-hoc signed.
        INFOPLIST_KEY_SUFeedURL: "https://github.com/yashashwi-s/Fadeo/releases/latest/download/appcast.xml"
        INFOPLIST_KEY_SUPublicEDKey: "W2pgF4QWAE9eVwtxgnRL6QIsdQb1EwiDxk/dOohuhOk="
        INFOPLIST_KEY_SUEnableAutomaticChecks: YES
        INFOPLIST_KEY_SUScheduledCheckInterval: "86400"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: NO
        DEAD_CODE_STRIPPING: YES
        # Manual + ad-hoc ("-") so this builds identically with no signing team, both
        # locally and on a CI runner with no Apple Developer ID configured. This matches
        # Tableau's proven CI pattern. Once a Developer ID exists, this is the one place
        # to flip to a real identity (see PLAN.md's packaging section).
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        COMBINE_HIDPI_IMAGES: YES
