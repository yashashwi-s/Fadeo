name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-core:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Test FadeoCore
        run: swift test --package-path Packages/FadeoCore

  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      # Yams ships a top-level Bazel "BUILD" file, which collides with xcodebuild's own
      # per-package "build/" product staging directory on macOS's default case-insensitive
      # filesystem ("BUILD" == "build" there). This isn't a race (pre-resolving first
      # doesn't help, verified) — it's deterministic. The standard fix is to build from a
      # case-sensitive APFS volume instead, so the two paths are genuinely distinct.
      - name: Create case-sensitive build volume
        run: |
          hdiutil create -size 8g -type SPARSE -fs 'Case-sensitive APFS' -volname CIBuild ~/ci-build
          MOUNT=$(hdiutil attach ~/ci-build.sparseimage -nobrowse | tail -1 | awk '{print $NF}')
          echo "CI_VOLUME=$MOUNT" >> "$GITHUB_ENV"

      - name: Copy checkout to case-sensitive volume
        run: |
          mkdir -p "$CI_VOLUME/Fadeo"
          cp -R . "$CI_VOLUME/Fadeo"

      - name: Generate Xcode Project
        working-directory: ${{ env.CI_VOLUME }}/Fadeo
        run: xcodegen generate

      - name: Resolve Package Dependencies
        working-directory: ${{ env.CI_VOLUME }}/Fadeo
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Fadeo.xcodeproj \
            -scheme Fadeo \
            -derivedDataPath build

      # No CONFIGURATION_BUILD_DIR override here: forcing every target's product into one
      # flat directory confuses xcodebuild's implicit search paths for SPM package module
      # products, which is what caused "no such module 'Yams'" even though Yams itself had
      # started compiling. Let xcodebuild use its normal per-configuration layout under
      # derivedDataPath and locate the .app afterward instead.
      - name: Build
        working-directory: ${{ env.CI_VOLUME }}/Fadeo
        run: |
          xcodebuild \
            -project Fadeo.xcodeproj \
            -scheme Fadeo \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            build

      - name: Validate Build
        working-directory: ${{ env.CI_VOLUME }}/Fadeo
        run: |
          APP_PATH=$(find build -maxdepth 5 -name "Fadeo.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Fadeo.app not found"
            exit 1
          fi
          echo "Found: $APP_PATH"
          SIZE=$(du -sm "$APP_PATH" | cut -f1)
          echo "Fadeo.app size: ${SIZE}MB"
          if [ "$SIZE" -lt 1 ]; then
            echo "Build output too small (${SIZE}MB)"
            exit 1
          fi
