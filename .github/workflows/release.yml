name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Test FadeoCore
        run: swift test --package-path Packages/FadeoCore

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild \
            -project Fadeo.xcodeproj \
            -scheme Fadeo \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=build/Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            build

      - name: Validate Build
        run: |
          APP_PATH="build/Release/Fadeo.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Fadeo.app not found"
            exit 1
          fi
          SIZE=$(du -sm "$APP_PATH" | cut -f1)
          echo "Fadeo.app size: ${SIZE}MB"
          if [ "$SIZE" -lt 1 ]; then
            echo "Build output too small"
            exit 1
          fi

      - name: Package Zip
        run: |
          cd build/Release
          ditto -c -k --sequesterRsrc --keepParent Fadeo.app Fadeo.app.zip

      - name: Package DMG
        run: |
          hdiutil create \
            -volname "Fadeo" \
            -srcfolder build/Release/Fadeo.app \
            -ov -format UDZO \
            build/Release/Fadeo.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Fadeo ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/Release/Fadeo.app.zip
            build/Release/Fadeo.dmg
